name: Build and Deploy Pensieve

on:
  push:
    branches: [main]
    paths:
      - 'thoughts/**'
      - 'main.go'
      - 'templates/**'
      - 'style.css'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      
      - name: Install dependencies
        run: go mod tidy
      
      - name: Build site
        run: go run main.go
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output