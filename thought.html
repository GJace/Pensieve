<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{(index .Thoughts 0).Slug}} - Pensieve</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <h1><a href="../index.html">Pensieve</a></h1>
    </header>

    <main>
        {{$thought := index .Thoughts 0}}
        <article class="thought-full">
            <time>{{$thought.DateString}}</time>
            
            <div class="content">
                {{$thought.Content}}
            </div>

            <div class="tags">
                {{range $thought.Tags}}
                <span class="tag">{{.}}</span>
                {{end}}
            </div>

            <nav class="thought-nav">
                {{if $thought.PrevThought}}
                <a href="{{$thought.PrevThought.Slug}}.html">← Previous</a>
                {{else}}
                <span class="disabled">← Previous</span>
                {{end}}
                
                <span>·</span>
                
                {{if $thought.NextThought}}
                <a href="{{$thought.NextThought.Slug}}.html">Next →</a>
                {{else}}
                <span class="disabled">Next →</span>
                {{end}}
            </nav>
        </article>
    </main>

    <footer>
        <p><a href="../index.html">← Back to all thoughts</a></p>
    </footer>
</body>
</html>
