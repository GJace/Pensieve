<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.MonthTitle}} - Pensieve</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <h1><a href="../index.html">Pensieve</a></h1>
        <p>{{.MonthTitle}}</p>
    </header>

    <main>
        {{range .Thoughts}}
        <article class="thought-preview">
            <div class="content">
                {{.Preview}}{{if .IsLong}} <a href="../{{.HTMLPath}}" class="read-more">more</a>{{end}}</p>
            </div>
            <div class="tags-and-date">
                <div class="tags">
                    {{range .Tags}}
                    <span class="tag">{{.}}</span>
                    {{end}}
                </div>
                <time>{{.DateString}}</time>
            </div>
        </article>
        {{end}}
    </main>

    <footer>
        <nav class="archive-nav">
            {{if .PrevMonth}}
            <a href="{{.PrevMonth}}.html">← Previous month</a>
            {{else}}
            <span class="disabled">← Previous month</span>
            {{end}}
            
            <a href="index.html">All months</a>
            
            {{if .NextMonth}}
            <a href="{{.NextMonth}}.html">Next month →</a>
            {{else}}
            <span class="disabled">Next month →</span>
            {{end}}
        </nav>
    </footer>
</body>
</html>
